<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="refresh" content="1; url=https://landing.tirrenia.eu/it/landing/kw42/">
    <link rel="canonical" href="https://landing.tirrenia.eu/it/landing/kw42/">
    <title>KW42 Tirrenia</title>
    <script>
      window.setTimeout(function () {
        window.location.replace('https://landing.tirrenia.eu/it/landing/kw42/' + window.location.search + window.location.hash);
      }, 250);
    </script>
    <style>
      :root {
        color-scheme: light;
        --ink: #18232f;
        --muted: #5b6876;
        --sea: #0c6f86;
        --coffee: #7a4a24;
        --cream: #fff8ee;
        --line: rgba(24, 35, 47, 0.14);
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          linear-gradient(120deg, rgba(12, 111, 134, 0.14), rgba(122, 74, 36, 0.10)),
          var(--cream);
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(560px, 100%);
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.86);
        border-radius: 8px;
        padding: 28px;
        box-shadow: 0 20px 60px rgba(24, 35, 47, 0.10);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 28px;
      }

      .mark {
        width: 42px;
        height: 42px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--sea), var(--coffee));
      }

      .brand strong {
        display: block;
        font-size: 18px;
        line-height: 1.1;
      }

      .brand span {
        color: var(--muted);
        font-size: 13px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(30px, 6vw, 48px);
        line-height: 1;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 17px;
        line-height: 1.5;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 28px;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 0 18px;
        border-radius: 6px;
        text-decoration: none;
        font-weight: 700;
      }

      .primary {
        color: white;
        background: var(--sea);
      }

      .secondary {
        color: var(--ink);
        border: 1px solid var(--line);
        background: white;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="brand" aria-label="Tirrenia">
        <div class="mark" aria-hidden="true"></div>
        <div>
          <strong>Tirrenia</strong>
          <span>KW42</span>
        </div>
      </div>
      <h1>Ti stiamo portando alla pagina KW42</h1>
      <p>Tra un attimo vedrai feedback anonimi, menu, recensioni e il premio collegato all’esperienza.</p>
      <div class="actions">
        <a class="primary" href="https://landing.tirrenia.eu/it/landing/kw42/">Apri la landing</a>
        <a class="secondary" href="https://landing.tirrenia.eu/it/">Vai al sito Tirrenia</a>
      </div>
    </main>
  </body>
</html>
